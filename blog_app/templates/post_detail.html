{% extends 'base.html' %}

{% block title %}{{ post.title }} - Django Blog{% endblock %}

{% block content %}
<article class="post-entry">
    <h2>{{ post.title }}</h2>
    <div class="post-meta">Full Article</div>
    <p>{{ post.body }}</p>
</article>

<div class="action-buttons">
    {% if user.is_authenticated %}
        <a href="{% url 'post_edit' post.pk %}" class="btn btn-warning">Edit Post</a>
        <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Delete Post</a>
    {% endif %}
    <a href="{% url 'home' %}" class="btn" style="background: linear-gradient(135deg, #27ae60 0%, #229954 100%);">← Back to Posts</a>
</div>
{% endblock content %}
