{% extends 'base.html' %}

{% block title %}{{ post.title }} - Django Blog{% endblock %}

{% block content %}
<article class="post-entry">
    <h2>{{ post.title }}</h2>
    <p>{{ post.body }}</p>
</article>

<div style="margin-top: 2rem; display: flex; gap: 1rem;">
    <a href="{% url 'post_edit' post.pk %}" style="background-color: #f39c12;">✏️ Edit Post</a>
    <a href="{% url 'post_delete' post.pk %}" style="background-color: #e74c3c;">🗑️ Delete Post</a>
    <a href="{% url 'home' %}" style="background-color: #27ae60;">← Back to Posts</a>
</div>
{% endblock content %}
