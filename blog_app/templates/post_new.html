{% extends 'base.html' %}

{% block title %}Create New Post - Django Blog{% endblock %}

{% block content %}
<div class="post-form-container">
    <h1>✨ Create New Blog Post</h1>
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="📤 Publish Post">
    </form>
</div>
{% endblock content %}
